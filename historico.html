<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scan - Meu Histórico</title>
  <style>
    body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
    .btn-voltar { background: #222; color: #fff; border: 1px solid #333; padding: 8px 15px; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; margin-bottom: 20px; font-weight: bold; }
    .container { max-width: 600px; margin: 0 auto; }
    .box-hist { background: #0d0d11; border: 1px solid #222; border-radius: 8px; padding: 15px; }
    .item-lido { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #1c1c22; font-size: 14px; }
  </style>
</head>
<body>

  <div class="container">
    <a href="index.html" class="btn-voltar">⬅️ Voltar para o Início</a>
    <h1 style="color:#2ecc71; margin-top: 0;">⏱️ HISTÓRICO DE LEITURA</h1>

    <div class="box-hist" id="caixaHist">
      <div id="vazio" style="color:#666; text-align:center; padding:10px;">Nenhum progresso registrado localmente.</div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const caixa = document.getElementById("caixaHist"); const vazio = document.getElementById("vazio");
      for (let i = 0; i < localStorage.length; i++) {
        let k = localStorage.key(i);
        if (localStorage.getItem(k) === "lido") {
          if(vazio) vazio.remove();
          let div = document.createElement("div"); div.className = "item-lido";
          div.innerHTML = `<span>✔️ CAPÍTULO: ${k.toUpperCase()}</span> <span style="color:#2ecc71; font-weight:bold; font-size:12px;">LIDO</span>`;
          caixa.appendChild(div);
        }
      }
    });
  </script>
</body>
</html>
